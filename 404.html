<!DOCTYPE html>
<html lang="ua">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 — Сторінку не знайдено</title>

<link rel="stylesheet" href="styles.css">

<style>

body{
margin:0;
font-family:"InterVariable", sans-serif;

background:
linear-gradient(to bottom, white 0%, rgba(255,255,255,0) 120px),
linear-gradient(rgba(255,255,255,0.9), rgba(255,255,255,0.7)),
url("images/background.jpg");

display:flex;
align-items:center;
justify-content:center;

min-height:100vh;
}

.error-container{
text-align:center;
max-width:700px;
padding:40px;
}

.error-number{
font-size:120px;
font-weight:700;
margin-bottom:10px;
}

.error-title{
font-size:2rem;
margin-bottom:20px;
}

.error-text{
font-size:1.2rem;
margin-bottom:40px;
}

.home-btn{
display:inline-block;
padding:14px 30px;
background:black;
color:white;
text-decoration:none;
border-radius:25px;
font-size:1.1rem;

transition:transform 0.3s, box-shadow 0.3s;
}

.home-btn:hover{
transform:scale(1.05);
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.tiles{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;

max-width:300px;
margin:40px auto;
}

.tiles div{
aspect-ratio:1/1;
background:#ddd;
border-radius:8px;

animation:tileFloat 3s ease-in-out infinite;
}

.tiles div:nth-child(2){animation-delay:0.3s;}
.tiles div:nth-child(3){animation-delay:0.6s;}
.tiles div:nth-child(4){animation-delay:0.9s;}
.tiles div:nth-child(5){animation-delay:1.2s;}
.tiles div:nth-child(6){animation-delay:1.5s;}

@keyframes tileFloat{

0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}

}

@media (max-width:768px){

.error-number{
font-size:80px;
}

.tiles{
grid-template-columns:repeat(3,60px);
}

}

</style>
</head>

<body>

<div class="error-container">

<div class="error-number">404</div>

<div class="error-title">
Сторінку не знайдено
</div>

<p class="error-text">
Можливо ця сторінка була переміщена або більше не існує.
</p>

<a href="index.html" class="home-btn">
Повернутися на головну
</a>

<div class="tiles">

<div></div>
<div></div>
<div></div>

<div></div>
<div></div>
<div></div>

</div>

</div>

</body>
</html>
